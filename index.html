<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GCC HR Enterprise Management Platform</title>

    <!-- PWA primary configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1565C0" />
    <meta name="description" content="GCC HR Enterprise Management Platform" />

    <!-- iOS Install & Theme Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GCC HR" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Windows Tiles and PWA Integration -->
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <meta name="msapplication-TileColor" content="#1565C0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('GCC HR Service Worker registered successfully on scope:', registration.scope);
            })
            .catch((error) => {
              console.error('GCC HR Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
